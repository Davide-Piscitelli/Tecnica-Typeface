<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tecnica Typeface - Font Tester</title>
    <style>
        /* Font Loading from your GitHub Repository */
        @font-face {
            font-family: 'Tecnica-53';
            src: url('https://raw.githubusercontent.com/Davide-Piscitelli/Tecnica-Typeface/main/fonts/webfonts/Tecnica-53.woff2') format('woff2');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Tecnica-55';
            src: url('https://raw.githubusercontent.com/Davide-Piscitelli/Tecnica-Typeface/main/fonts/webfonts/Tecnica-55.woff2') format('woff2');
            font-weight: 700;
        }
        @font-face {
            font-family: 'Tecnica-53Line';
            src: url('https://raw.githubusercontent.com/Davide-Piscitelli/Tecnica-Typeface/main/fonts/webfonts/Tecnica-53Line.woff2') format('woff2');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Tecnica-55Line';
            src: url('https://raw.githubusercontent.com/Davide-Piscitelli/Tecnica-Typeface/main/fonts/webfonts/Tecnica-55Line.woff2') format('woff2');
            font-weight: 700;
        }

        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            padding: 40px; 
            background: #f8f9fa; 
            color: #212529;
            max-width: 1200px;
            margin: 0 auto;
        }
        header { margin-bottom: 40px; }
        h1 { margin: 0 0 5px 0; font-size: 32px; font-weight: 800; }
        .subtitle { margin: 0; font-size: 18px; color: #6c757d; text-transform: uppercase; letter-spacing: 1px; }
        
        .panel {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 30px;
        }
        .controls { 
            display: flex;
            gap: 25px;
            align-items: center;
            flex-wrap: wrap;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        select, input[type="text"] { 
            padding: 12px; 
            font-size: 16px; 
            border: 1px solid #ced4da;
            border-radius: 6px;
            background-color: #fff;
        }
        input[type="text"] { flex-grow: 1; min-width: 300px; }
        label { font-size: 14px; font-weight: 600; color: #495057; }
        .value-display { font-size: 14px; font-weight: 600; color: #6c757d; min-width: 45px; }

        /* Sections */
        h3 { font-size: 16px; color: #495057; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 0.5px; }
        
        /* Interactive Preview */
        #preview { 
            font-family: 'Tecnica-53', sans-serif; 
            font-size: 48px; 
            border: 1px solid #dee2e6; 
            border-radius: 6px;
            padding: 25px; 
            background: white; 
            min-height: 100px;
            outline: none;
            word-wrap: break-word;
        }

        /* Type Sizes Cascade */
        .size-row {
            display: flex;
            align-items: flex-start;
            border-bottom: 1px solid #f1f3f5;
            padding: 15px 0;
        }
        .size-label {
            width: 80px;
            font-size: 12px;
            color: #adb5bd;
            font-family: monospace;
            padding-top: 5px;
        }
        .size-text {
            flex-grow: 1;
            word-wrap: break-word;
            outline: none;
        }

        /* Glyph Palette */
        .glyph-section { margin-bottom: 30px; }
        .glyph-section h4 { font-size: 13px; color: #6c757d; margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 0.5px; }
        .glyph-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 10px;
        }
        .glyph-box {
            font-family: 'Tecnica-53', sans-serif;
            font-size: 32px; 
            text-align: center;
            padding: 15px 0;
            background: #f1f3f5;
            border-radius: 6px;
            border: 1px solid #e9ecef;
            user-select: all;
            transition: background 0.2s;
        }
        .glyph-box:hover {
            background: #e9ecef;
        }
    </style>
</head>
<body>

    <header>
        <h1>Tecnica Typeface</h1>
        <p class="subtitle">Font Tester</p>
    </header>
    
    <div class="panel controls">
        <div class="control-group">
            <label for="familySelect">Family:</label>
            <select id="familySelect">
                <option value="Tecnica">Tecnica (Standard)</option>
                <option value="TecnicaLine">Tecnica Line</option>
            </select>
        </div>

        <div class="control-group">
            <label for="weightSelect">Weight:</label>
            <select id="weightSelect">
                <option value="400">53 (Regular)</option>
                <option value="700">55 (Bold)</option>
            </select>
        </div>

        <div class="control-group">
            <label for="textSizeInput">Text Size:</label>
            <input type="range" id="textSizeInput" min="16" max="144" value="48">
            <span id="textSizeValue" class="value-display">48px</span>
        </div>

        <div class="control-group">
            <label for="glyphSizeInput">Glyph Size:</label>
            <input type="range" id="glyphSizeInput" min="24" max="72" value="32">
            <span id="glyphSizeValue" class="value-display">32px</span>
        </div>

        <input type="text" id="textInput" value="The quick brown fox jumps over the lazy dog" placeholder="Type custom text...">
    </div>

    <h3>1. Interactive Text Preview</h3>
    <div class="panel">
        <div id="preview" contenteditable="true">The quick brown fox jumps over the lazy dog</div>
    </div>

    <h3>2. Graphic Design Sizes</h3>
    <div class="panel" id="sizeCascade"></div>

    <h3>3. Complete Glyph Palette</h3>
    <div class="panel" id="glyphPalette"></div>

    <script>
        const familySelect = document.getElementById('familySelect');
        const weightSelect = document.getElementById('weightSelect');
        const textSizeInput = document.getElementById('textSizeInput');
        const textSizeValue = document.getElementById('textSizeValue');
        const glyphSizeInput = document.getElementById('glyphSizeInput');
        const glyphSizeValue = document.getElementById('glyphSizeValue');
        const textInput = document.getElementById('textInput');
        const preview = document.getElementById('preview');
        const sizeCascade = document.getElementById('sizeCascade');
        const glyphPalette = document.getElementById('glyphPalette');

        const standardSizes = [12, 14, 18, 24, 36, 48, 60, 72, 96, 120];

        // Cleaned string with inverted question mark correctly set
        const glyphGroups = {
            "Uppercase": "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
            "Lowercase": "abcdefghijklmnopqrstuvwxyz",
            "Numbers": "0123456789",
            "Punctuation & Symbols": "\u00BF!\"#$%&'()*+,-./:;<=>?@[\\]^_`{|}~\u00A1\u00A2\u00A3\u00A4\u00A5\u00A6\u00A7\u00A8\u00A9\u00AA\u00AB\u00AC\u00AE\u00AF\u00B0\u00B1\u00B2\u00B3\u00B4\u00B6\u00B9\u00BA\u00BB\u00BC\u00BD\u00BE\u2013\u2014\u2018\u2019\u201C\u201D\u201E\u2020\u2021\u2022\u2026\u2030\u2039\u203A\u2044\u20AC\u2212\u221A\u221E\u00AC\u222B\u2248\u2260\u2264\u2266",
            "Extended & Accented": "ÀÁÂÃÄÅÆÇÈÉÊËÌÍÎÏÐÑÒÓÔÕÖØÙÚÛÜÝÞßàáâãäåæçèéêëìíîïðñòóôõöøùúûüýþÿ"
        };

        // Render rows
        standardSizes.forEach(size => {
            const row = document.createElement('div');
            row.className = 'size-row';
            
            const label = document.createElement('div');
            label.className = 'size-label';
            label.textContent = size + ' pt';
            
            const text = document.createElement('div');
            text.className = 'size-text';
            text.style.fontSize = size + 'px';
            text.contentEditable = true;
            text.textContent = textInput.value;
            
            row.appendChild(label);
            row.appendChild(text);
            sizeCascade.appendChild(row);
        });

        // Render glyph palette
        for (const [groupName, chars] of Object.entries(glyphGroups)) {
            const section = document.createElement('div');
            section.className = 'glyph-section';
            
            const heading = document.createElement('h4');
            heading.textContent = groupName;
            section.appendChild(heading);
            
            const grid = document.createElement('div');
            grid.className = 'glyph-grid';
            
            chars.split("").forEach(char => {
                const box = document.createElement('div');
                box.className = 'glyph-box';
                box.textContent = char;
                grid.appendChild(box);
            });
            
            section.appendChild(grid);
            glyphPalette.appendChild(section);
        }

        function updateFontSettings() {
            const family = familySelect.value;
            const weight = weightSelect.value;

            let fontName = 'Tecnica-53';
            if (family === 'Tecnica' && weight === '700') fontName = 'Tecnica-55';
            if (family === 'TecnicaLine' && weight === '400') fontName = 'Tecnica-53Line';
            if (family === 'TecnicaLine' && weight === '700') fontName = 'Tecnica-55Line';

            preview.style.fontFamily = fontName + ', sans-serif';

            document.querySelectorAll('.size-text').forEach(el => {
                el.style.fontFamily = fontName + ', sans-serif';
            });

            document.querySelectorAll('.glyph-box').forEach(el => {
                el.style.fontFamily = fontName + ', sans-serif';
            });
        }

        textSizeInput.addEventListener('input', () => {
            preview.style.fontSize = textSizeInput.value + 'px';
            textSizeValue.textContent = textSizeInput.value + 'px';
        });

        glyphSizeInput.addEventListener('input', () => {
            document.querySelectorAll('.glyph-box').forEach(el => {
                el.style.fontSize = glyphSizeInput.value + 'px';
            });
            glyphSizeValue.textContent = glyphSizeInput.value + 'px';
        });

        textInput.addEventListener('input', () => {
            preview.textContent = textInput.value || ' ';
            document.querySelectorAll('.size-text').forEach(el => {
                el.textContent = textInput.value || ' ';
            });
        });

        familySelect.addEventListener('change', updateFontSettings);
        weightSelect.addEventListener('change', updateFontSettings);

        updateFontSettings();
    </script>
</body>
</html>
