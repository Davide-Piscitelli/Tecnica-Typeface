<!DOCTYPE html>
<html lang="en">

        /* Font Loading from your GitHub Repository */
        @font-face {

            font-weight: 400;
        }
        @font-face {
            font-family: 'Tecnica-55';

        }
        @font-face {

        }
        @font-face {
            font-family: 'Tecnica-55Line';

        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            padding: 40px; 
            background: #f8f9fa; 
            color: #212529;
            max-width: 1200px;
            margin: 0 auto;
        }
        header { margin-bottom: 40px; }
        h1 { margin: 0 0 5px 0; font-size: 32px; font-weight: 800; }
        .subtitle { margin: 0; font-size: 18px; color: #6c757d; text-transform: uppercase; letter-spacing: 1px; }
        
        .panel {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 30px;
        }
        .controls { 
            display: flex;
            gap: 25px;
            align-items: center;
            flex-wrap: wrap;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        select, input[type="text"] { 
            padding: 12px; 
            font-size: 16px; 
            border: 1px solid #ced4da;
            border-radius: 6px;
            background-color: #fff;
        }
        input[type="text"] { flex-grow: 1; min-width: 300px; }
        label { font-size: 14px; font-weight: 600; color: #495057; }
        .value-display { font-size: 14px; font-weight: 600; color: #6c757d; min-width: 45px; }

        /* Sections */
        h3 { font-size: 16px; color: #495057; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 0.5px; }
        
        /* Interactive Preview */
        #preview { 
            font-family: 'Tecnica-53', sans-serif; 
            font-size: 48px; 
            border: 1px solid #dee2e6; 
            border-radius: 6px;
            padding: 25px; 
            background: white; 
            min-height: 100px;
            outline: none;
            word-wrap: break-word;
        }

        /* Type Sizes Cascade */
        .size-row {
            display: flex;
            align-items: flex-start;
            border-bottom: 1px solid #f1f3f5;
            padding: 15px 0;
        }
        .size-label {
            width: 80px;
            font-size: 12px;
            color: #adb5bd;
            font-family: monospace;
            padding-top: 5px;
        }
        .size-text {
            flex-grow: 1;
            word-wrap: break-word;
            outline: none;
        }

        /* Glyph Palette */
        .glyph-section { margin-bottom: 30px; }
        .glyph-section h4 { font-size: 13px; color: #6c757d; margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 0.5px; }

            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));

        }
